name: "ns"

x-lockdown: &lockdown
  # prevents write access to the image itself
  read_only: true
  # prevents any process within the container to gain more privileges
  security_opt:
    - "no-new-privileges=true"

services:
  resolver:
    image: "11notes/bind:9.18.31"
    <<: *lockdown
    command: ["resolver"]
    environment:
      TZ: "Europe/Zurich"
    tmpfs:
      - "/var/run/named:uid=1000,gid=1000"
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "8053:8053/tcp"
    networks:
      frontend:
    sysctls:
      net.ipv4.ip_unprivileged_port_start: 53
    restart: "always"

networks:
  frontend: