name: cron

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: checkout all tags
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2
        with:
          ref: 'master'
          fetch-depth: 0

      - name: get latest version
        uses: actions/github-script@62c3794a3eb6788d9a2a72b219504732c0c9a298
        with:
          script: |
            (async()=>{
              let found = false;
              const res = await fetch('https://www.isc.org/download/');
              if(res && res.status === 200){
                const html = await res.text();
                const trs = [...html.replace(/[\r\n]*/ig, '').matchAll(/<tr>(.*?)<\/tr>/ig)];
                for(const tr of trs){
                  const tds = [...tr[0].matchAll(/<td[^>]*>(.*?)<\/td>/ig)];
                  if(Array.isArray(tds)){
                    for(const td of tds){
                      if(/This software is recommended for production use/i.test(td.input) && /Current Stable, ESV/i.test(td.input)){
                        core.exportVariable('LATEST_VERSION', td[1]);
                        core.info(`found bind version ${td[1]}`);
                        found = true;
                        break;
                      }
                    }
                  }
                }
              }

              if(!found){
                core.setFailed('no version for bind could be found!');
              }
            })();

      - name: get last tag
        run: |
          export LATEST_TAG=$(git describe --abbrev=0 --tags `git rev-list --tags --max-count=1` | sed 's|v||')
          echo "WORKFLOW_UPDATE_BASE64JSON=$(echo '{"version":"'${LATEST_VERSION}'", "tag":"'${LATEST_TAG}'", "unraid":true, "nobody":true}' | base64 -w 0)" >> "${GITHUB_ENV}"

      - name: call org.update
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: org.update.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "etc":"${{ env.WORKFLOW_UPDATE_BASE64JSON }}" }'